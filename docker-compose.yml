version: "3.9"

services:
  mysql:
    image: mysql:8.3
    container_name: ec2-user-mysql-1
    environment:
      MYSQL_DATABASE: maquinasmedellin
      MYSQL_USER: myuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    depends_on:
      mysql:
        condition: service_healthy
    command: repair migrate
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/maquinasmedellin?allowPublicKeyRetrieval=true&useSSL=false
      FLYWAY_USER: myuser
      FLYWAY_PASSWORD: ${MYSQL_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_OUT_OF_ORDER: "true"
      FLYWAY_VALIDATE_ON_MIGRATE: "false"
    volumes:
      - ./db/migration:/flyway/sql

  web:
    build: .
    container_name: ec2-user-web-1
    # Puerto 5000 no expuesto al exterior — nginx es el único punto de entrada
    expose:
      - "5000"
    volumes:
      - firmware_data:/app/maquinas-medellin-frontend/static/firmware
    depends_on:
      mysql:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      DB_HOST: mysql
      DB_USER: myuser
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: maquinasmedellin
      SECRET_KEY: ${SECRET_KEY}
      ALERT_PHONE: ${ALERT_PHONE}
      CALLMEBOT_APIKEY: ${CALLMEBOT_APIKEY}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM}
      ALERT_EMAIL_PASSWORD: ${ALERT_EMAIL_PASSWORD}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: ec2-user-nginx-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # Intenta renovar cada 12h; Let's Encrypt renueva solo si faltan menos de 30 días
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

volumes:
  mysql_data:
  firmware_data:
