version: "3.9"

services:
  mysql:
    image: mysql:8.3
    container_name: ec2-user-mysql-1
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: maquinasmedellin
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD:
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  flyway:
    image: flyway/flyway:11
    container_name: flyway
    depends_on:
      - mysql
    volumes:
      - ./db/migration:/flyway/sql
    command: >
      -url=jdbc:mysql://mysql:3306/maquinasmedellin
      -user=myuser
      -password=mypassword
      migrate
    restart: "no"

  web:
    build: .
    container_name: ec2-user-web-1
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - flyway
    environment:
      DB_HOST: mysql
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: maquinasmedellin
    restart: unless-stopped

volumes:
  mysql_data:
