version: "3.9"

services:
  mysql:
    image: mysql:8.3
    container_name: ec2-user-mysql-1
    environment:
      MYSQL_DATABASE: maquinasmedellin
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    depends_on:
      mysql:
        condition: service_healthy
    command: repair migrate
    environment:
      FLYWAY_URL: jdbc:mysql://mysql:3306/maquinasmedellin
      FLYWAY_USER: myuser
      FLYWAY_PASSWORD: mypassword
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_OUT_OF_ORDER: "true"
      FLYWAY_VALIDATE_ON_MIGRATE: "false"
    volumes:
      - ./db/migration:/flyway/sql

  web:
    build: .
    container_name: ec2-user-web-1
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      DB_HOST: mysql
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: maquinasmedellin
      ALERT_PHONE: "573218001092"
      CALLMEBOT_APIKEY: "4191841"
      ALERT_EMAIL_FROM: "maquinasmedellin1@gmail.com"
      ALERT_EMAIL_PASSWORD: "aqtdwzfgiiufxggv"
      ALERT_EMAIL_TO: "maquinasmedellin1@gmail.com"
    restart: always

volumes:
  mysql_data:
