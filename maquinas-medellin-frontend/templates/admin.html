<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Fondo partículas -->
  <div id="particles-js"></div>

  <!-- Header -->
  <header class="bg-gray-900 text-white shadow-lg">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center">
        <img src="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" alt="Logo" class="h-10 w-10 mr-3">
        <h1 class="text-2xl font-bold">Panel de Administración</h1>
      </div>
      <div class="flex items-center space-x-4">
        <span class="text-sm">Admin User</span>
        <button onclick="cerrarSesion()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm">
          <i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-6 py-8">
    <!-- Estadísticas rápidas -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <div class="flex items-center">
          <div class="p-3 bg-blue-100 rounded-full">
            <i class="fas fa-users text-blue-600 text-xl"></i>
          </div>
          <div class="ml-4">
            <h3 class="text-2xl font-bold text-gray-800">152</h3>
            <p class="text-gray-600">Usuarios Totales</p>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <div class="flex items-center">
          <div class="p-3 bg-green-100 rounded-full">
            <i class="fas fa-gamepad text-green-600 text-xl"></i>
          </div>
          <div class="ml-4">
            <h3 class="text-2xl font-bold text-gray-800">47</h3>
            <p class="text-gray-600">Máquinas Activas</p>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <div class="flex items-center">
          <div class="p-3 bg-orange-100 rounded-full">
            <i class="fas fa-box text-orange-600 text-xl"></i>
          </div>
          <div class="ml-4">
            <h3 class="text-2xl font-bold text-gray-800">89</h3>
            <p class="text-gray-600">Paquetes Hoy</p>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <div class="flex items-center">
          <div class="p-3 bg-red-100 rounded-full">
            <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
          </div>
          <div class="ml-4">
            <h3 class="text-2xl font-bold text-gray-800">12</h3>
            <p class="text-gray-600">Incidencias</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Secciones de administración -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- Gestión de Usuarios -->
      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <h2 class="text-xl font-bold mb-4 text-gray-800">
          <i class="fas fa-users mr-2 text-blue-600"></i>Gestión de Usuarios
        </h2>
        <div class="space-y-3">
          <button onclick="cargarSeccion('usuarios')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-list mr-2"></i>Ver Todos los Usuarios
          </button>
          <button onclick="cargarSeccion('nuevo-usuario')" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-plus mr-2"></i>Crear Nuevo Usuario
          </button>
          <button onclick="cargarSeccion('roles')" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-key mr-2"></i>Gestionar Roles
          </button>
        </div>
      </div>

      <!-- Gestión de Máquinas -->
      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <h2 class="text-xl font-bold mb-4 text-gray-800">
          <i class="fas fa-gamepad mr-2 text-green-600"></i>Gestión de Máquinas
        </h2>
        <div class="space-y-3">
          <button onclick="cargarSeccion('maquinas')" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-list mr-2"></i>Inventario de Máquinas
          </button>
          <button onclick="cargarSeccion('nueva-maquina')" class="w-full bg-green-700 hover:bg-green-800 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-plus mr-2"></i>Agregar Máquina
          </button>
          <button onclick="cargarSeccion('mantenimiento')" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-tools mr-2"></i>Programar Mantenimiento
          </button>
        </div>
      </div>

      <!-- Reportes y Analytics -->
      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <h2 class="text-xl font-bold mb-4 text-gray-800">
          <i class="fas fa-chart-bar mr-2 text-purple-600"></i>Reportes y Analytics
        </h2>
        <div class="space-y-3">
          <button onclick="cargarSeccion('ventas')" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-money-bill-wave mr-2"></i>Reporte de Ventas
          </button>
          <button onclick="cargarSeccion('rendimiento')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-tachometer-alt mr-2"></i>Rendimiento por Local
          </button>
          <button onclick="cargarSeccion('auditoria')" class="w-full bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-history mr-2"></i>Logs de Auditoría
          </button>
        </div>
      </div>

      <!-- Gestión de Locales -->
      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <h2 class="text-xl font-bold mb-4 text-gray-800">
          <i class="fas fa-store mr-2 text-orange-600"></i>Gestión de Locales
        </h2>
        <div class="space-y-3">
          <button onclick="cargarSeccion('locales')" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-list mr-2"></i>Todos los Locales
          </button>
          <button onclick="cargarSeccion('nuevo-local')" class="w-full bg-orange-700 hover:bg-orange-800 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-plus mr-2"></i>Agregar Local
          </button>
          <button onclick="cargarSeccion('asignaciones')" class="w-full bg-teal-600 hover:bg-teal-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-user-friends mr-2"></i>Asignar Personal
          </button>
        </div>
      </div>

      <!-- Configuración del Sistema -->
      <div class="bg-white rounded-xl p-6 shadow-md card-hover">
        <h2 class="text-xl font-bold mb-4 text-gray-800">
          <i class="fas fa-cog mr-2 text-gray-600"></i>Configuración del Sistema
        </h2>
        <div class="space-y-3">
          <button onclick="cargarSeccion('configuracion')" class="w-full bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-sliders-h mr-2"></i>Ajustes Generales
          </button>
          <button onclick="cargarSeccion('backup')" class="w-full bg-gray-700 hover:bg-gray-800 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-database mr-2"></i>Backup y Restauración
          </button>
          <button onclick="cargarSeccion('api')" class="w-full bg-gray-800 hover:bg-gray-900 text-white py-2 px-4 rounded-lg text-left">
            <i class="fas fa-code mr-2"></i>API y Integraciones
          </button>
        </div>
      </div>
    </div>

    <!-- Área de contenido dinámico -->
    <div id="contenido-dinamico" class="mt-8 bg-white rounded-xl p-6 shadow-md hidden">
      <h2 class="text-2xl font-bold mb-4 text-gray-800" id="titulo-seccion">Sección</h2>
      <div id="contenido-seccion">
        <!-- Contenido de cada sección -->
      </div>
    </div>
  </main>

  <!-- Script de partículas -->
  <script src="{{ url_for('static', filename='js/particles-config.js') }}"></script>

  <script>
  // Configuración de partículas para el admin
  particlesJS("particles-js", {
    particles: {
      number: { value: 80, density: { enable: true, value_area: 800 } },
      color: { value: "#3B82F6" },
      opacity: { value: 0.5, random: true },
      size: { value: 3, random: true },
      line_linked: {
        enable: true,
        distance: 150,
        color: "#3B82F6",
        opacity: 0.4,
        width: 1
      }
    }
  });

  function cargarSeccion(seccion) {
    console.log(`Cargando sección: ${seccion}`);
    // Lógica para cargar el contenido dinámico
    document.getElementById('titulo-seccion').textContent = `Sección: ${seccion}`;
    document.getElementById('contenido-seccion').innerHTML = `
      <p class="text-gray-600">Contenido de ${seccion} se cargará aquí.</p>
      <p class="text-sm text-gray-500 mt-2">Esta funcionalidad está en desarrollo.</p>
    `;
    document.getElementById('contenido-dinamico').classList.remove('hidden');
  }

  function cerrarSesion() {
    if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
      console.log('Cerrando sesión de administración');
      window.location.href = "/";
    }
  }

  console.log("✅ Panel de administración cargado correctamente");
  </script>
</body>
</html>
