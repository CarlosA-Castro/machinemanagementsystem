<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panel de Administración - Máquinas Medellín</title>
  <link rel="icon" href="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" type="image/jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
    .btn-touch {
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
    
    @media (max-width: 1024px) {
      .container {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      
      .admin-grid {
        grid-template-columns: 1fr !important;
      }
    }
    
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr !important;
      }
      
      header {
        flex-direction: column;
        text-align: center;
        padding: 1rem !important;
      }
      
      header > div {
        margin-bottom: 1rem;
      }
      
      .header-buttons {
        margin-top: 1rem;
      }
      
      h1 {
        font-size: 1.5rem !important;
      }
      
      .text-2xl {
        font-size: 1.25rem !important;
      }
    }
    
    @media (max-width: 480px) {
      .container {
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
      }
      
      main {
        padding: 1rem !important;
      }
      
      .glass-card {
        padding: 1rem !important;
      }
      
      .btn-touch {
        width: 100%;
        margin-bottom: 0.5rem;
      }
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Fondo partículas optimizado -->
  <div id="particles-js"></div>

  <!-- Header responsive -->
  <header class="bg-gray-900 text-white shadow-lg">
  <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
    <div class="flex items-center mb-3 md:mb-0">
      <img src="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" alt="Logo" class="h-8 w-8 mr-3">
      <h1 class="text-xl font-bold">Panel de Administración</h1>
    </div>
    <div class="flex items-center space-x-3 header-buttons">

        <i class="fas fa-home mr-1"></i><span class="hidden md:inline">Ir a Local</span>
      </a>
      <span class="text-sm hidden md:block">{{ nombre_usuario }}</span>

</header>

    <div class="admin-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

        </h2>
        <div class="space-y-2">
          <button onclick="cargarSeccion('usuarios')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-3 rounded-lg text-left btn-touch text-sm">
            <i class="fas fa-list mr-2"></i>Ver Todos los Usuarios

          <button onclick="cargarSeccion('nuevo-usuario')" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded-lg text-left btn-touch text-sm">

          <button onclick="cargarSeccion('maquinas')" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded-lg text-left btn-touch text-sm">

        </button>

</button>

  <!-- Script de partículas optimizado -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      particlesJS("particles-js", {
        particles: {
          number: { value: 60, density: { enable: true, value_area: 600 } },
          color: { value: "#3B82F6" },
          opacity: { value: 0.3, random: true },
          size: { value: 2, random: true },
          line_linked: {
            enable: true,
            distance: 120,
            color: "#3B82F6",
            opacity: 0.2,
            width: 1
          },
          move: {
            enable: true,
            speed: 0.6,
            direction: 'none',
            random: true
          }
        },
        interactivity: {
          detect_on: 'canvas',
          events: {
            onhover: { enable: true, mode: 'grab' },
            onclick: { enable: true, mode: 'push' },
            resize: true
          },
          modes: {
            grab: { distance: 100, line_linked: { opacity: 0.6 } },
            push: { particles_nb: 2 }
          }
        },
        retina_detect: true
      });

      // Cargar estadísticas reales
      cargarEstadisticas();
    });

    async function cargarEstadisticas() {
    try {
        const response = await fetch('/api/estadisticas-admin', {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });
        
        if (response.ok) {
            const data = await response.json();
            document.getElementById('total-users').textContent = data.usuarios || '0';
            document.getElementById('total-machines').textContent = data.maquinas || '0';
            document.getElementById('today-packages').textContent = data.paquetes || '0';
            document.getElementById('total-issues').textContent = data.incidencias || '0';
        } else {
            // Si hay error, mostrar ceros
            document.getElementById('total-users').textContent = '0';
            document.getElementById('total-machines').textContent = '0';
            document.getElementById('today-packages').textContent = '0';
            document.getElementById('total-issues').textContent = '0';
        }
    } catch (error) {
        console.error('Error cargando estadísticas:', error);
        // Mostrar ceros en caso de error
        document.getElementById('total-users').textContent = '0';
        document.getElementById('total-machines').textContent = '0';
        document.getElementById('today-packages').textContent = '0';
        document.getElementById('total-issues').textContent = '0';
    }
}

// Función para cargar usuarios reales
async function cargarUsuarios() {
    const response = await fetch('/api/usuarios');
    const usuarios = await response.json();
    
    let html = `
        <div class="mb-4">
            <h3 class="text-lg font-semibold mb-2">Total de usuarios: ${usuarios.length}</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-2 text-left">ID</th>
                        <th class="p-2 text-left">Nombre</th>
                        <th class="p-2 text-left">Rol</th>
                        <th class="p-2 text-left">Local</th>
                        <th class="p-2 text-left">Acciones</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    usuarios.forEach(usuario => {
        html += `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-2">${usuario.id}</td>
                <td class="p-2 font-medium">${usuario.name}</td>
                <td class="p-2">
                    <span class="px-2 py-1 rounded-full text-xs ${
                        usuario.role === 'admin' ? 'bg-purple-100 text-purple-800' :
                        usuario.role === 'supervisor' ? 'bg-blue-100 text-blue-800' :
                        'bg-green-100 text-green-800'
                    }">
                        ${usuario.role}
                    </span>
                </td>
                <td class="p-2">${usuario.local || 'No asignado'}</td>
                <td class="p-2">
                    <button onclick="editarUsuario(${usuario.id})" class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs mr-1">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="eliminarUsuario(${usuario.id})" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += `</tbody></table></div>`;
    return html;
}

// Función para cargar máquinas 
async function cargarMaquinas() {
    const response = await fetch('/api/maquinas-con-propiedades');
    const maquinas = await response.json();
    
    let html = `
        <div class="mb-6">
            <h3 class="text-lg font-semibold mb-4">Inventario de Máquinas - Distribución de Propiedad</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-blue-800">Total Máquinas</h4>
                    <p class="text-2xl font-bold">${maquinas.length}</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-green-800">% Restaurante</h4>
                    <p class="text-2xl font-bold">35%</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-purple-800">Propietarios</h4>
                    <p class="text-2xl font-bold">3</p>
                </div>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-left">ID</th>
                        <th class="p-3 text-left">Máquina</th>
                        <th class="p-3 text-left">Tipo</th>
                        <th class="p-3 text-left">Estado</th>
                        <th class="p-3 text-left">Propietarios</th>
                        <th class="p-3 text-left">% Total</th>
                        <th class="p-3 text-left">% Rest.</th>
                        <th class="p-3 text-left">Acciones</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    maquinas.forEach(maquina => {
        // Determinar color del estado
        let estadoColor = 'bg-gray-100 text-gray-800';
        let estadoIcon = 'fa-question';
        
        if (maquina.estado === 'activa') {
            estadoColor = 'bg-green-100 text-green-800';
            estadoIcon = 'fa-check-circle';
        } else if (maquina.estado === 'mantenimiento') {
            estadoColor = 'bg-yellow-100 text-yellow-800';
            estadoIcon = 'fa-tools';
        } else if (maquina.estado === 'inactiva') {
            estadoColor = 'bg-red-100 text-red-800';
            estadoIcon = 'fa-times-circle';
        }
        
        // Determinar color del porcentaje total
        let porcentajeColor = 'text-green-600';
        if (maquina.porcentaje_total < 100) {
            porcentajeColor = 'text-red-600';
        } else if (maquina.porcentaje_total > 100) {
            porcentajeColor = 'text-orange-600';
        }
        
        html += `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-3 font-mono">${maquina.id}</td>
                <td class="p-3 font-medium">${maquina.nombre}</td>
                <td class="p-3">
                    <span class="px-2 py-1 rounded-full text-xs bg-blue-100 text-blue-800">
                        ${maquina.tipo || 'No especificado'}
                    </span>
                </td>
                <td class="p-3">
                    <span class="px-2 py-1 rounded-full text-xs ${estadoColor}">
                        <i class="fas ${estadoIcon} mr-1"></i>${maquina.estado}
                    </span>
                </td>
                <td class="p-3 text-xs">
                    <div class="max-w-xs truncate" title="${maquina.propietarios}">
                        ${maquina.propietarios}
                    </div>
                </td>
                <td class="p-3 font-bold ${porcentajeColor}">
                    ${maquina.porcentaje_total}%
                </td>
                <td class="p-3 text-orange-600 font-semibold">
                    ${maquina.porcentaje_restaurante}%
                </td>
                <td class="p-3">
                    <button onclick="verDetalleMaquina(${maquina.id})" 
                            class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs mr-1"
                            title="Ver detalles y distribución">
                        <i class="fas fa-chart-pie"></i>
                    </button>
                    <button onclick="editarMaquina(${maquina.id})" 
                            class="bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded text-xs mr-1">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="gestionarPropiedad(${maquina.id})" 
                            class="bg-purple-500 hover:bg-purple-600 text-white px-2 py-1 rounded text-xs mr-1"
                            title="Gestionar propiedad">
                        <i class="fas fa-handshake"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += `</tbody></table></div>`;
    return html;
}

// Función para calcular total de propiedad en tiempo real
function calcularTotalPropiedad() {
    let total = 0;
    for (let i = 1; i <= 3; i++) {
        const input = document.getElementById(`propietario-${i}`);
        if (input) {
            total += parseInt(input.value) || 0;
        }
    }
    
    const totalElement = document.getElementById('total-propiedad');
    totalElement.textContent = total + '%';
    totalElement.className = `text-xl font-bold ${total === 100 ? 'text-green-600' : 'text-red-600'}`;
}

    if (sessionStorage.getItem('formularioMaquinaPendiente') === 'true') {
        // Volver al formulario de máquina
        cargarSeccion('nueva-maquina');
        
        // Restaurar valores
        setTimeout(() => {
            if (document.getElementById('nombre')) {
                document.getElementById('nombre').value = sessionStorage.getItem('nombreMaquinaTemporal') || '';
            }
            if (document.getElementById('tipo')) {
                document.getElementById('tipo').value = sessionStorage.getItem('tipoMaquinaTemporal') || '';
            }
            
            // Limpiar storage
            sessionStorage.removeItem('formularioMaquinaPendiente');
            sessionStorage.removeItem('nombreMaquinaTemporal');
            sessionStorage.removeItem('tipoMaquinaTemporal');
            
            // Recargar propietarios
            (async () => {
                inicializarPropietarios(await obtenerPropietarios());
                alert('¡Propietario creado! Puede asignarlo a la máquina.');
            })();
        }, 500);
    }
}

// Función para inicializar propietarios en el formulario
function inicializarPropietarios(propietarios) {
    const container = document.getElementById('propietarios-container');
    container.innerHTML = '';
    
    propietarios.forEach(propietario => {
        agregarFilaPropietario(propietario.id, propietario.nombre, 0);
    });
    
    calcularTotalPropiedadNueva();
}

// Función para agregar fila de propietario
function agregarFilaPropietario(id, nombre, valor) {
    const container = document.getElementById('propietarios-container');
    
    const div = document.createElement('div');
    div.className = 'flex items-center justify-between bg-gray-50 p-3 rounded';
    div.innerHTML = `
        <span class="font-medium text-sm">${nombre}</span>
        <div class="flex items-center">
            <input type="number" 
                   value="${valor}"
                   min="0" max="100" step="1"
                   class="w-20 px-2 py-1 border border-gray-300 rounded text-center propietario-input"
                   data-propietario-id="${id}"
                   onchange="calcularTotalPropiedadNueva()">
            <span class="ml-2 text-gray-600 text-sm">%</span>
            <button type="button" 
                    onclick="eliminarPropietario(this)"
                    class="ml-2 text-red-500 hover:text-red-700">
                <i class="fas fa-times"></i>
            </button>
        </div>
    `;
    
    container.appendChild(div);
}

        sessionStorage.setItem('formularioMaquinaPendiente', 'true');

// Función para eliminar propietario del formulario
function eliminarPropietario(button) {
    const div = button.closest('div.flex.items-center');
    div.remove();
    calcularTotalPropiedadNueva();
}

// Función para calcular total de propiedad en nueva máquina
function calcularTotalPropiedadNueva() {
    let total = 0;
    const inputs = document.querySelectorAll('.propietario-input');
    
    inputs.forEach(input => {
        total += parseInt(input.value) || 0;
    });
    
    const totalElement = document.getElementById('total-propiedad-nueva');
    const mensajeError = document.getElementById('mensaje-error-total');
    
    totalElement.textContent = total + '%';
    
    if (total === 100) {
        totalElement.className = 'text-lg font-bold text-green-600';
        mensajeError.className = 'text-green-600 text-xs mt-1';
        mensajeError.textContent = '✓ Porcentajes correctos';
    } else {
        totalElement.className = 'text-lg font-bold text-red-600';
        mensajeError.className = 'text-red-600 text-xs mt-1';
        mensajeError.textContent = 'Los porcentajes deben sumar 100%';
    }
    
    return total;
}

// Función para crear nueva máquina
async function crearMaquina(event) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const totalPropiedad = calcularTotalPropiedadNueva();
    
    if (totalPropiedad !== 100) {
        alert('Error: Los porcentajes de propiedad deben sumar exactamente 100%');
        return;
    }
    
    // Recopilar datos de propietarios
    const propietarios = [];
    const inputs = document.querySelectorAll('.propietario-input');
    
    inputs.forEach(input => {
        const porcentaje = parseInt(input.value);
        if (porcentaje > 0) {
            propietarios.push({
                propietario_id: parseInt(input.dataset.propietarioId),
                porcentaje_propiedad: porcentaje
            });
        }
    });
    
    const maquinaData = {
        nombre: formData.get('nombre'),
        tipo: formData.get('tipo'),
        local_id: parseInt(formData.get('local')),
        porcentaje_restaurante: parseFloat(formData.get('porcentaje_restaurante')),
        propietarios: propietarios
    };
    
    try {
        const response = await fetch('/api/maquinas', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(maquinaData)
        });
        
        if (response.ok) {
            alert('Máquina creada exitosamente');
            cargarSeccion('maquinas');
        } else {
            const error = await response.json();
            alert('Error al crear la máquina: ' + (error.error || 'Error desconocido'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al crear la máquina');
    }
}

// Función para inicializar propietarios en edición
function inicializarPropietariosEdicion(propietarios, propietariosActuales) {
    const container = document.getElementById('propietarios-container');
    container.innerHTML = '';
    
    // Crear mapa de porcentajes actuales
    const porcentajesActuales = {};
    propietariosActuales.forEach(prop => {
        porcentajesActuales[prop.id] = prop.porcentaje_propiedad;
    });
    
    // Agregar propietarios al formulario
    propietarios.forEach(propietario => {
        const porcentajeActual = porcentajesActuales[propietario.id] || 0;
        agregarFilaPropietarioEdicion(propietario.id, propietario.nombre, porcentajeActual);
    });
    
    calcularTotalPropiedadEdicion();
}

// Función para agregar fila de propietario en edición
function agregarFilaPropietarioEdicion(id, nombre, valor) {
    const container = document.getElementById('propietarios-container');
    
    const div = document.createElement('div');
    div.className = 'flex items-center justify-between bg-gray-50 p-3 rounded';
    div.innerHTML = `
        <span class="font-medium text-sm">${nombre}</span>
        <div class="flex items-center">
            <input type="number" 
                   value="${valor}"
                   min="0" max="100" step="1"
                   class="w-20 px-2 py-1 border border-gray-300 rounded text-center propietario-input-editar"
                   data-propietario-id="${id}"
                   onchange="calcularTotalPropiedadEdicion()">
            <span class="ml-2 text-gray-600 text-sm">%</span>
        </div>
    `;
    
    container.appendChild(div);
}

// Función para calcular total de propiedad en edición
function calcularTotalPropiedadEdicion() {
    let total = 0;
    const inputs = document.querySelectorAll('.propietario-input-editar');
    
    inputs.forEach(input => {
        total += parseInt(input.value) || 0;
    });
    
    const totalElement = document.getElementById('total-propiedad-editar');
    const mensajeError = document.getElementById('mensaje-error-total-editar');
    
    totalElement.textContent = total + '%';
    
    if (total === 100) {
        totalElement.className = 'text-lg font-bold text-green-600';
        mensajeError.className = 'text-green-600 text-xs mt-1';
        mensajeError.textContent = '✓ Porcentajes correctos';
    } else {
        totalElement.className = 'text-lg font-bold text-red-600';
        mensajeError.className = 'text-red-600 text-xs mt-1';
        mensajeError.textContent = 'Los porcentajes deben sumar 100%';
    }
    
    return total;
}

// Función para actualizar máquina
async function actualizarMaquina(event, maquinaId) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const totalPropiedad = calcularTotalPropiedadEdicion();
    
    if (totalPropiedad !== 100) {
        alert('Error: Los porcentajes de propiedad deben sumar exactamente 100%');
        return;
    }
    
    // Recopilar datos de propietarios
    const propietarios = [];
    const inputs = document.querySelectorAll('.propietario-input-editar');
    
    inputs.forEach(input => {
        const porcentaje = parseInt(input.value);
        if (porcentaje > 0) {
            propietarios.push({
                propietario_id: parseInt(input.dataset.propietarioId),
                porcentaje_propiedad: porcentaje
            });
        }
    });
    
    const maquinaData = {
        nombre: formData.get('nombre'),
        tipo: formData.get('tipo'),
        estado: formData.get('estado'),
        porcentaje_restaurante: parseFloat(formData.get('porcentaje_restaurante')),
        propietarios: propietarios
    };
    
    try {
        const response = await fetch(`/api/maquinas/${maquinaId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(maquinaData)
        });
        
        if (response.ok) {
            alert('Máquina actualizada exitosamente');
            cargarSeccion('maquinas');
        } else {
            const error = await response.json();
            alert('Error al actualizar la máquina: ' + (error.error || 'Error desconocido'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al actualizar la máquina');
    }
}

        descripcion: formData.get('descripcion'),

        requiere_repuestos: formData.get('requiere_repuestos') === 'on'
    };
    
    try {
        const response = await fetch('/api/mantenimiento', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',

}

// Función para crear nuevo usuario
async function crearUsuario(event) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const password = formData.get('password');
    const confirmarPassword = formData.get('confirmar_password');
    
    if (password !== confirmarPassword) {
        alert('Las contraseñas no coinciden');
        return;
    }
    
    if (password.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres');
        return;
    }
    
    const usuario = {
        nombre: formData.get('nombre'),
        password: password,
        role: formData.get('role'),
        local: formData.get('local') || 'El Mekatiadero'
    };
    
    try {
        const response = await fetch('/api/usuarios', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(usuario)
        });
        
        if (response.ok) {
            alert('Usuario creado exitosamente');
            cargarSeccion('usuarios');
        } else {
            const error = await response.json();
            alert('Error al crear el usuario: ' + (error.error || 'Error desconocido'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al crear el usuario');
    }
}

// Función para cambiar rol de usuario

    const nuevoRol = document.getElementById(`nuevo-rol-${usuarioId}`).value;

            method: 'PUT',

                'Content-Type': 'application/json',

            body: JSON.stringify({ role: nuevoRol })

        if (response.ok) {
            alert('Rol cambiado exitosamente');

        } else {
            alert('Error al cambiar el rol');
        }

// Función auxiliar para calcular distribución
function calcularDistribucionMaquina(maquina) {
    const distribucion = { edison: 0, andres: 0, beliza: 0, total: 0 };
    
    // Parsear los propietarios del string
    if (maquina.propietarios && maquina.propietarios !== 'No asignado') {
        const propietariosArray = maquina.propietarios.split(', ');
        
        propietariosArray.forEach(prop => {
            if (prop.includes('Edison')) {
                const match = prop.match(/Edison\s*\((\d+)%\)/);
                if (match) distribucion.edison = parseInt(match[1]);
            }
            if (prop.includes('Andrés')) {
                const match = prop.match(/Andrés\s*\((\d+)%\)/);
                if (match) distribucion.andres = parseInt(match[1]);
            }
            if (prop.includes('Beliza')) {
                const match = prop.match(/Beliza\s*\((\d+)%\)/);
                if (match) distribucion.beliza = parseInt(match[1]);
            }
        });
    }
    
    distribucion.total = distribucion.edison + distribucion.andres + distribucion.beliza;
    return distribucion;
}
// Función para cargar distribución de ganancias
async function cargarDistribucionGanancias() {
    const response = await fetch('/api/maquinas-con-propiedades');
    const maquinas = await response.json();
    
    // Calcular totales por propietario
    let totalEdison = 0, totalAndres = 0, totalBeliza = 0;
    let maquinasCount = 0;
    
    maquinas.forEach(maquina => {
        const distribucion = calcularDistribucionMaquina(maquina);
        const porcentajeRestaurante = maquina.nombre.includes('Peluches') ? 30 : 35;
        const porcentajePropietarios = 100 - porcentajeRestaurante;
        
        totalEdison += (distribucion.edison * porcentajePropietarios) / 100;
        totalAndres += (distribucion.andres * porcentajePropietarios) / 100;

    });
    
    // Calcular promedios
    const promedioEdison = maquinasCount > 0 ? (totalEdison / maquinasCount).toFixed(1) : 0;
    const promedioAndres = maquinasCount > 0 ? (totalAndres / maquinasCount).toFixed(1) : 0;

        activo: formData.get('activo') === 'on'
    };
    
    try {
        const response = await fetch('/api/paquetes', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(paquete)
        });
        
        if (response.ok) {
            alert('Paquete creado exitosamente');
            cargarSeccion('paquetes');
        } else {
            alert('Error al crear el paquete');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al crear el paquete');
    }
}

// Función para cargar locales en un select
async function cargarLocalesEnSelect(selectId) {
    try {
        const response = await fetch('/api/locales');
        const locales = await response.json();
        
        const select = document.getElementById(selectId);
        select.innerHTML = '<option value="">Seleccionar local</option>';
        
        locales.forEach(local => {
            if (local.status === 'activo') {
                const option = document.createElement('option');
                option.value = local.name;
                option.textContent = local.name;
                select.appendChild(option);
            }
        });
    } catch (error) {
        console.error('Error cargando locales:', error);
    }
}

function cerrarSeccion() {
    document.getElementById('contenido-dinamico').classList.add('hidden');
}

function cerrarSesion() {
    if (confirm('¿Estás seguro de que quieres cerrar sesión?')) {
        document.body.innerHTML += `
        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg p-6 text-center">
            <div class="loading mx-auto mb-4"></div>
            <p class="text-gray-600">Cerrando sesión...</p>
            </div>
        </div>
        `;
        
        setTimeout(() => {
        window.location.href = "/logout";
        }, 1000);
    }
}
// Función DE SECCIONES GENERALES
async function cargarSeccion(seccion) {
    document.getElementById('contenido-dinamico').classList.remove('hidden');
    document.getElementById('titulo-seccion').textContent = obtenerTituloSeccion(seccion);
    
    let contenido = '';
    
    switch(seccion) {
        case 'usuarios':
            contenido = await cargarUsuarios();
            break;
        case 'nuevo-usuario':
            contenido = await cargarFormularioNuevoUsuario();
            break;
        case 'roles':
            contenido = await cargarGestionRoles();
            break;
        case 'maquinas':
            contenido = await cargarMaquinas();
            break;
        case 'paquetes':
            contenido = await cargarPaquetes();
            break;
        case 'nuevo-paquete':
            contenido = await cargarFormularioNuevoPaquete();
            break;
        case 'ventas':
            contenido = await cargarReporteVentas();
            break;
        case 'incidencias':
            contenido = await cargarIncidencias();
            break;
        case 'distribucion-ganancias':
            contenido = await cargarDistribucionGanancias();
            break;
        case 'nueva-maquina':
            await cargarFormularioNuevaMaquina();
            return;
            case 'gestionar-propietarios':
             contenido = await cargarGestionPropietarios();
            break;
        case 'nuevo-propietario':
            contenido = await cargarFormularioNuevoPropietario();
            break;
        case 'mantenimiento':
            await cargarProgramarMantenimiento();
            return;
        default:
            contenido = `<div class="text-center py-8">
                <i class="fas fa-tools text-4xl text-gray-400 mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-600">Sección en desarrollo</h3>
                <p class="text-gray-500">La funcionalidad para "${obtenerTituloSeccion(seccion)}" estará disponible pronto.</p>
            </div>`;
    }
    
    document.getElementById('contenido-seccion').innerHTML = contenido;
}
