<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panel de Administración - Máquinas Medellín</title>
  <link rel="icon" href="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" type="image/jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
    .btn-touch {
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
    
    @media (max-width: 1024px) {
      .container {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      
      .admin-grid {
        grid-template-columns: 1fr !important;
      }
    }
    
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr !important;
      }
      
      header {
        flex-direction: column;
        text-align: center;
        padding: 1rem !important;
      }
      
      header > div {
        margin-bottom: 1rem;
      }
      
      .header-buttons {
        margin-top: 1rem;
      }
      
      h1 {
        font-size: 1.5rem !important;
      }
      
      .text-2xl {
        font-size: 1.25rem !important;
      }
    }
    
    @media (max-width: 480px) {
      .container {
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
      }
      
      main {
        padding: 1rem !important;
      }
      
      .glass-card {
        padding: 1rem !important;
      }
      
      .btn-touch {
        width: 100%;
        margin-bottom: 0.5rem;
      }
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Fondo partículas optimizado -->
  <div id="particles-js"></div>

  <!-- Header responsive -->
  <header class="bg-gray-900 text-white shadow-lg">
  <div class="container mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center">
    <div class="flex items-center mb-3 md:mb-0">
      <img src="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" alt="Logo" class="h-8 w-8 mr-3">
      <h1 class="text-xl font-bold">Panel de Administración</h1>
    </div>
    <div class="flex items-center space-x-3 header-buttons">
      <a href="/local" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg text-sm btn-touch">
        <i class="fas fa-home mr-1"></i><span class="hidden md:inline">Ir a Local</span>
      </a>
      <span class="text-sm hidden md:block">{{ nombre_usuario }}</span>
      <button onclick="cerrarSesion()" class="bg-red-600 hover:bg-red-700 px-3 py-2 rounded-lg text-sm btn-touch">

</header>

    <div class="admin-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

        <div class="space-y-2">
          <button onclick="cargarSeccion('usuarios')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-3 rounded-lg text-left btn-touch text-sm">
            <i class="fas fa-list mr-2"></i>Ver Todos los Usuarios

          <button onclick="cargarSeccion('nuevo-usuario')" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-3 rounded-lg text-left btn-touch text-sm">

      <!-- Gestión de Máquinas -->

</button>

  <!-- Script de partículas optimizado -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      particlesJS("particles-js", {
        particles: {
          number: { value: 60, density: { enable: true, value_area: 600 } },
          color: { value: "#3B82F6" },
          opacity: { value: 0.3, random: true },
          size: { value: 2, random: true },
          line_linked: {
            enable: true,
            distance: 120,
            color: "#3B82F6",
            opacity: 0.2,
            width: 1
          },
          move: {
            enable: true,
            speed: 0.6,
            direction: 'none',
            random: true
          }
        },
        interactivity: {
          detect_on: 'canvas',
          events: {
            onhover: { enable: true, mode: 'grab' },
            onclick: { enable: true, mode: 'push' },
            resize: true
          },
          modes: {
            grab: { distance: 100, line_linked: { opacity: 0.6 } },
            push: { particles_nb: 2 }
          }
        },
        retina_detect: true
      });

      // Cargar estadísticas reales
      cargarEstadisticas();
    });

    async function cargarEstadisticas() {
    try {
        const response = await fetch('/api/estadisticas-admin', {
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });
        
        if (response.ok) {
            const data = await response.json();
            document.getElementById('total-users').textContent = data.usuarios || '0';
            document.getElementById('total-machines').textContent = data.maquinas || '0';
            document.getElementById('today-packages').textContent = data.paquetes || '0';
            document.getElementById('total-issues').textContent = data.incidencias || '0';
        } else {
            // Si hay error, mostrar ceros
            document.getElementById('total-users').textContent = '0';
            document.getElementById('total-machines').textContent = '0';
            document.getElementById('today-packages').textContent = '0';
            document.getElementById('total-issues').textContent = '0';
        }
    } catch (error) {
        console.error('Error cargando estadísticas:', error);
        // Mostrar ceros en caso de error
        document.getElementById('total-users').textContent = '0';
        document.getElementById('total-machines').textContent = '0';
        document.getElementById('today-packages').textContent = '0';
        document.getElementById('total-issues').textContent = '0';
    }
}

// Función para cargar usuarios reales
async function cargarUsuarios() {
    const response = await fetch('/api/usuarios');
    const usuarios = await response.json();
    
    let html = `
        <div class="mb-4">
            <h3 class="text-lg font-semibold mb-2">Total de usuarios: ${usuarios.length}</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-2 text-left">ID</th>
                        <th class="p-2 text-left">Nombre</th>
                        <th class="p-2 text-left">Rol</th>
                        <th class="p-2 text-left">Local</th>
                        <th class="p-2 text-left">Acciones</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    usuarios.forEach(usuario => {
        html += `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-2">${usuario.id}</td>
                <td class="p-2 font-medium">${usuario.name}</td>
                <td class="p-2">
                    <span class="px-2 py-1 rounded-full text-xs ${
                        usuario.role === 'admin' ? 'bg-purple-100 text-purple-800' :
                        usuario.role === 'supervisor' ? 'bg-blue-100 text-blue-800' :
                        'bg-green-100 text-green-800'
                    }">
                        ${usuario.role}
                    </span>
                </td>
                <td class="p-2">${usuario.local || 'No asignado'}</td>
                <td class="p-2">
                    <button onclick="editarUsuario(${usuario.id})" class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs mr-1">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="eliminarUsuario(${usuario.id})" class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += `</tbody></table></div>`;
    return html;
}

// Función para cargar máquinas 
async function cargarMaquinas() {
    const response = await fetch('/api/maquinas-con-propiedades');
    const maquinas = await response.json();
    
    let html = `
        <div class="mb-6">
            <h3 class="text-lg font-semibold mb-4">Inventario de Máquinas - Distribución de Propiedad</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-blue-800">Total Máquinas</h4>
                    <p class="text-2xl font-bold">${maquinas.length}</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-green-800">% Restaurante</h4>
                    <p class="text-2xl font-bold">35%</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg">
                    <h4 class="font-semibold text-purple-800">Propietarios</h4>
                    <p class="text-2xl font-bold">3</p>
                </div>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-left">ID</th>
                        <th class="p-3 text-left">Máquina</th>
                        <th class="p-3 text-left">Tipo</th>
                        <th class="p-3 text-left">Estado</th>
                        <th class="p-3 text-left">Propietarios</th>
                        <th class="p-3 text-left">% Total</th>
                        <th class="p-3 text-left">% Rest.</th>
                        <th class="p-3 text-left">Acciones</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    maquinas.forEach(maquina => {
        // Determinar color del estado
        let estadoColor = 'bg-gray-100 text-gray-800';
        let estadoIcon = 'fa-question';
        
        if (maquina.estado === 'activa') {
            estadoColor = 'bg-green-100 text-green-800';
            estadoIcon = 'fa-check-circle';
        } else if (maquina.estado === 'mantenimiento') {
            estadoColor = 'bg-yellow-100 text-yellow-800';
            estadoIcon = 'fa-tools';
        } else if (maquina.estado === 'inactiva') {
            estadoColor = 'bg-red-100 text-red-800';
            estadoIcon = 'fa-times-circle';
        }
        
        // Determinar color del porcentaje total
        let porcentajeColor = 'text-green-600';
        if (maquina.porcentaje_total < 100) {
            porcentajeColor = 'text-red-600';
        } else if (maquina.porcentaje_total > 100) {
            porcentajeColor = 'text-orange-600';
        }
        
        html += `
            <tr class="border-b hover:bg-gray-50">
                <td class="p-3 font-mono">${maquina.id}</td>
                <td class="p-3 font-medium">${maquina.nombre}</td>
                <td class="p-3">
                    <span class="px-2 py-1 rounded-full text-xs bg-blue-100 text-blue-800">
                        ${maquina.tipo || 'No especificado'}
                    </span>
                </td>
                <td class="p-3">
                    <span class="px-2 py-1 rounded-full text-xs ${estadoColor}">
                        <i class="fas ${estadoIcon} mr-1"></i>${maquina.estado}
                    </span>
                </td>
                <td class="p-3 text-xs">
                    <div class="max-w-xs truncate" title="${maquina.propietarios}">
                        ${maquina.propietarios}
                    </div>
                </td>
                <td class="p-3 font-bold ${porcentajeColor}">
                    ${maquina.porcentaje_total}%
                </td>
                <td class="p-3 text-orange-600 font-semibold">
                    ${maquina.porcentaje_restaurante}%
                </td>
                <td class="p-3">
                    <button onclick="verDetalleMaquina(${maquina.id})" 
                            class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs mr-1"
                            title="Ver detalles y distribución">
                        <i class="fas fa-chart-pie"></i>
                    </button>
                    <button onclick="editarMaquina(${maquina.id})" 
                            class="bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded text-xs mr-1">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button onclick="gestionarPropiedad(${maquina.id})" 
                            class="bg-purple-500 hover:bg-purple-600 text-white px-2 py-1 rounded text-xs mr-1"
                            title="Gestionar propiedad">
                        <i class="fas fa-handshake"></i>
                    </button>
                </td>
            </tr>
        `;
    });
    
    html += `</tbody></table></div>`;
    return html;
}

// Función para ver detalle de máquina
async function verDetalleMaquina(maquinaId) {
    try {
        const response = await fetch(`/api/maquina-detalle/${maquinaId}`);
        const data = await response.json();

// Función para crear nuevo usuario
async function crearUsuario(event) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const password = formData.get('password');
    const confirmarPassword = formData.get('confirmar_password');
    
    if (password !== confirmarPassword) {
        alert('Las contraseñas no coinciden');
        return;
    }
    
    if (password.length < 6) {
        alert('La contraseña debe tener al menos 6 caracteres');
        return;
    }
    
    const usuario = {
        nombre: formData.get('nombre'),
        password: password,
        role: formData.get('role'),
        local: formData.get('local') || 'El Mekatiadero'
    };
    
    try {
        const response = await fetch('/api/usuarios', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(usuario)
        });
        
        if (response.ok) {
            alert('Usuario creado exitosamente');
            cargarSeccion('usuarios');
        } else {
            const error = await response.json();
            alert('Error al crear el usuario: ' + (error.error || 'Error desconocido'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al crear el usuario');
    }
}

// Función para cambiar rol de usuario
async function cambiarRol(usuarioId) {
    const nuevoRol = document.getElementById(`nuevo-rol-${usuarioId}`).value;
    
    if (!nuevoRol) {
        alert('Por favor selecciona un nuevo rol');
        return;
    }
    
    if (!confirm(`¿Estás seguro de cambiar el rol de este usuario a ${nuevoRol}?`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/usuarios/${usuarioId}/rol`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ role: nuevoRol })
        });
        
        if (response.ok) {
            alert('Rol cambiado exitosamente');
            cargarSeccion('roles');
        } else {
            alert('Error al cambiar el rol');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al cambiar el rol');
    }
}

// Función para actualizar usuario
async function actualizarUsuario(event, usuarioId) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const nuevaPassword = formData.get('nueva_password');
    
    const usuario = {
        nombre: formData.get('nombre'),
        role: formData.get('role'),
        local: formData.get('local') || 'El Mekatiadero'
    };
    
    if (nuevaPassword) {
        if (nuevaPassword.length < 6) {
            alert('La nueva contraseña debe tener al menos 6 caracteres');
            return;
        }
        usuario.nueva_password = nuevaPassword;
    }
    
    try {
        const response = await fetch(`/api/usuarios/${usuarioId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(usuario)
        });
        
        if (response.ok) {
            alert('Usuario actualizado exitosamente');
            cargarSeccion('usuarios');
        } else {
            alert('Error al actualizar el usuario');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al actualizar el usuario');
    }
}

}

// Función auxiliar para calcular distribución
function calcularDistribucionMaquina(maquina) {
    const distribucion = { edison: 0, andres: 0, beliza: 0, total: 0 };
    
    if (maquina.propietarios.includes('Edison')) {
        const match = maquina.propietarios.match(/Edison \((\d+)%\)/);
        if (match) distribucion.edison = parseInt(match[1]);
    }
    
    if (maquina.propietarios.includes('Andrés')) {
        const match = maquina.propietarios.match(/Andrés \((\d+)%\)/);
        if (match) distribucion.andres = parseInt(match[1]);
    }
    
    if (maquina.propietarios.includes('Beliza')) {
        const match = maquina.propietarios.match(/Beliza \((\d+)%\)/);
        if (match) distribucion.beliza = parseInt(match[1]);
    }
    
    distribucion.total = distribucion.edison + distribucion.andres + distribucion.beliza;
    return distribucion;
}

// Función para crear nuevo paquete
async function crearPaquete(event) {
    event.preventDefault();
    
    const formData = new FormData(event.target);
    const paquete = {
        nombre: formData.get('nombre'),
        turnos: parseInt(formData.get('turnos')),
        precio: parseInt(formData.get('precio')),
        activo: formData.get('activo') === 'on'
    };
    
    try {
        const response = await fetch('/api/paquetes', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(paquete)
        });
        
        if (response.ok) {
            alert('Paquete creado exitosamente');
            cargarSeccion('paquetes');
        } else {
            alert('Error al crear el paquete');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error al crear el paquete');
    }
}

// Función para cargar locales en un select
async function cargarLocalesEnSelect(selectId) {
    try {
        const response = await fetch('/api/locales');
        const locales = await response.json();
        
        const select = document.getElementById(selectId);
        select.innerHTML = '<option value="">Seleccionar local</option>';
        
        locales.forEach(local => {
            if (local.status === 'activo') {
                const option = document.createElement('option');
                option.value = local.name;
                option.textContent = local.name;
                select.appendChild(option);
            }
        });
    } catch (error) {
        console.error('Error cargando locales:', error);
    }
}
