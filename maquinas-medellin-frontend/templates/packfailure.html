<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Devolución - Máquinas Medellín</title>
    <link rel="icon" href="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" type="image/jpg" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }
        .contenido {
            position: relative;
            z-index: 10;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(31, 38, 135, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .btn-touch {
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
        }
        .status-valid {
            color: #10b981;
            font-weight: bold;
        }
        .status-invalid {
            color: #ef4444;
            font-weight: bold;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .contenido {
                padding: 1rem !important;
            }
            
            .glass-card {
                padding: 1rem;
                margin-bottom: 1rem;
            }
            
            h1 {
                font-size: 1.5rem !important;
            }
            
            h2 {
                font-size: 1.25rem !important;
            }
            
            .grid-cols-1 {
                grid-template-columns: 1fr !important;
            }
            
            .info-grid {
                grid-template-columns: 1fr !important;
                gap: 0.5rem !important;
            }
            
            .btn-touch {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .glass-card {
                padding: 0.75rem;
            }
            
            .btn-touch {
                padding: 1rem 0.5rem;
                font-size: 0.9rem;
            }
            
            .text-lg {
                font-size: 1rem !important;
            }
        }
    </style>
</head>
<body class="relative min-h-screen bg-gray-100 p-4">

    <!-- Fondo de partículas -->
    <div id="particles-js"></div>

    <!-- Contenido principal -->
    <div class="contenido max-w-4xl mx-auto space-y-6">

        <!-- Encabezado -->
        <div class="glass-card text-center">
            <h1 class="text-3xl font-bold mb-3">
                <i class="fas fa-exchange-alt text-blue-600 mr-2"></i>Devolución de Turnos
            </h1>
            <p class="text-gray-700">
                Sistema de devolución para paquetes con un solo uso registrado
            </p>
        </div>

        <!-- Sección de escaneo QR -->
        <div class="glass-card">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-qrcode text-green-600 mr-2"></i>Escanear Código QR del Paquete
            </h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Código QR del paquete:</label>
                <input 
                    id="qr-result" 
                    type="text" 
                    readonly 
                    class="w-full p-3 border-2 border-gray-300 rounded-lg bg-gray-50 text-center font-medium" 
                    placeholder="Escanea el código QR del paquete"
                >
            </div>

            <button 
                id="btn-scan-qr" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2 btn-touch"
            >
                <i class="fas fa-camera"></i>
                <span id="scanner-text">Escanear QR</span>
            </button>

            <!-- Contenedor para el escáner -->
            <div id="html5-qrcode-container" class="mt-4 hidden mx-auto w-full max-w-md">
                <div id="html5-qrcode-scanner" class="border-2 border-gray-300 rounded-lg overflow-hidden"></div>
            </div>
        </div>

        <!-- Información del paquete -->
        <div id="package-info" class="glass-card hidden">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-info-circle text-purple-600 mr-2"></i>Información del Paquete
            </h2>
            
            <div class="info-grid grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <div class="bg-gray-50 p-3 rounded-lg">
                    <h3 class="font-semibold text-gray-700">Código QR:</h3>
                    <p id="package-code" class="font-mono text-blue-600 text-sm"></p>
                </div>
                
                <div class="bg-gray-50 p-3 rounded-lg">
                    <h3 class="font-semibold text-gray-700">Turnos usados:</h3>
                    <p id="package-usage" class="font-bold"></p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg">
                    <h3 class="font-semibold text-gray-700">Paquete:</h3>
                    <p id="package-name" class="text-sm"></p>
                </div>

                <div class="bg-gray-50 p-3 rounded-lg">
                    <h3 class="font-semibold text-gray-700">Turnos totales:</h3>
                    <p id="package-turns" class=""></p>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-lg mb-4">
                <h3 class="font-semibold text-gray-700">Estado para devolución:</h3>
                <p id="package-status" class=""></p>
            </div>

            <!-- Botones de acción -->
            <div id="action-buttons" class="flex flex-col sm:flex-row gap-2 justify-center">
                <button 
                    id="btn-process-refund" 
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg btn-touch hidden"
                >
                    <i class="fas fa-check-circle mr-2"></i> Devolver 1 Turno
                </button>
                
                <button 
                    id="btn-cancel" 
                    class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg btn-touch"
                >
                    <i class="fas fa-sync mr-2"></i> Escanear otro
                </button>
            </div>
        </div>

        <!-- Mensaje de resultado -->
        <div id="result-message" class="glass-card hidden">
            <h2 class="text-xl font-semibold mb-3">
                <i class="fas fa-clipboard-list text-orange-600 mr-2"></i>Resultado
            </h2>
            <div id="result-content" class="p-3 rounded-lg bg-gray-50"></div>
        </div>

        <!-- Botón Volver -->
        <div class="text-center">
            <a href="{{ url_for('mostrar_local') }}" class="inline-block px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg font-medium btn-touch">
                <i class="fas fa-arrow-left mr-2"></i> Volver al Local
            </a>
        </div>
    </div>

    <script>
        // Namespace para PackFailure App
        const PackFailureApp = {
            init: function() {
                // Configuración de partículas optimizada
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 50, density: { enable: true, value_area: 600 } },
                        color: { value: '#3b82f6' },
                        shape: { type: 'circle' },
                        opacity: { value: 0.3, random: true },
                        size: { value: 2, random: true },
                        line_linked: { enable: true, distance: 100, color: '#3b82f6', opacity: 0.2, width: 1 },
                        move: { enable: true, speed: 0.6, direction: 'none', random: true }
                    },
                    interactivity: {
                        detect_on: 'canvas',
                        events: {
                            onhover: { enable: true, mode: 'grab' },
                            onclick: { enable: true, mode: 'push' },
                            resize: true
                        },
                        modes: {
                            grab: { distance: 100, line_linked: { opacity: 0.6 } },
                            push: { particles_nb: 2 }
                        }
                    },
                    retina_detect: true
                });

                // Variables para el escáner QR
                this.html5QrCodeScanner = null;
                this.scannerActivo = false;
                this.paqueteActual = null;
                
                // Elementos del DOM
                this.qrResult = document.getElementById('qr-result');
                this.btnScanQR = document.getElementById('btn-scan-qr');
                this.scannerText = document.getElementById('scanner-text');
                this.html5QrcodeContainer = document.getElementById('html5-qrcode-container');
                this.packageInfo = document.getElementById('package-info');
                this.resultMessage = document.getElementById('result-message');
                this.resultContent = document.getElementById('result-content');
                this.btnProcessRefund = document.getElementById('btn-process-refund');
                this.btnCancel = document.getElementById('btn-cancel');

                // Event listeners
                this.btnScanQR.addEventListener('click', () => this.toggleScanner());
                this.btnProcessRefund.addEventListener('click', () => this.procesarDevolucion());
                this.btnCancel.addEventListener('click', () => this.limpiarFormulario());

                console.log("PackFailure App inicializada correctamente");
            },

            toggleScanner: function() {
                if (this.scannerActivo) {
                    this.detenerScanner();
                    this.scannerText.innerHTML = '<i class="fas fa-camera mr-2"></i>Escanear QR';
                    return;
                }
                
                this.iniciarScanner();
                this.scannerText.innerHTML = '<div class="loading mr-2"></div> Escaneando...';
            },

            iniciarScanner: function() {
                if (!this.html5QrCodeScanner) {
                    this.html5QrCodeScanner = new Html5QrcodeScanner(
                        "html5-qrcode-scanner",
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        false
                    );

                    this.html5QrCodeScanner.render(
                        (decodedText) => {
                            this.qrResult.value = decodedText;
                            this.detenerScanner();
                            this.html5QrcodeContainer.classList.add("hidden");
                            this.scannerText.innerHTML = '<i class="fas fa-camera mr-2"></i>Escanear QR';
                            this.scannerActivo = false;
                            
                            // Verificar el paquete con la API real
                            this.verificarPaquete(decodedText);
                        },
                        (errorMessage) => {
                            console.log("Error escaneando:", errorMessage);
                        }
                    );
                }
                
                this.html5QrcodeContainer.classList.remove("hidden");
                this.scannerActivo = true;
            },

            detenerScanner: function() {
                if (this.html5QrCodeScanner) {
                    this.html5QrCodeScanner.clear().catch(error => {
                        console.error("Error al detener el escáner:", error);
                    });
                }
                this.html5QrcodeContainer.classList.add("hidden");
                this.scannerActivo = false;
            },

            // Función para verificar el paquete con la API real
            verificarPaquete: async function(codigoQR) {
                try {
                    this.mostrarCargando();
                    
                    const response = await fetch(`/api/verificar-qr/${codigoQR}`, {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('Error en la respuesta del servidor');
                    }
                    
                    const data = await response.json();
                    
                    if (data.existe) {
                        const turnosUsados = data.total_turns - data.turns_remaining;
                        
                        this.paqueteActual = {
                            codigo: codigoQR,
                            turns_remaining: data.turns_remaining,
                            total_turns: data.total_turns,
                            turnos_usados: turnosUsados,
                            package_name: data.package_name,
                            validoParaDevolucion: turnosUsados === 1 // Solo válido si tiene exactamente 1 uso
                        };
                        
                        this.mostrarInformacionPaquete();
                    } else {
                        this.mostrarError("❌ QR no encontrado", "El código QR escaneado no existe en el sistema.");
                    }
                } catch (error) {
                    console.error("Error verificando paquete:", error);
                    this.mostrarError("❌ Error de conexión", "No se pudo verificar el paquete. Intenta nuevamente.");
                }
            },

            mostrarInformacionPaquete: function() {
                document.getElementById('package-code').textContent = this.paqueteActual.codigo;
                document.getElementById('package-usage').textContent = `${this.paqueteActual.turnos_usados} de ${this.paqueteActual.total_turns}`;
                document.getElementById('package-name').textContent = this.paqueteActual.package_name || 'N/A';
                document.getElementById('package-turns').textContent = this.paqueteActual.total_turns;
                
                const statusElement = document.getElementById('package-status');
                
                if (this.paqueteActual.validoParaDevolucion) {
                    statusElement.innerHTML = '<span class="status-valid">✅ APTO PARA DEVOLUCIÓN</span>';
                    statusElement.innerHTML += '<p class="text-sm text-gray-600 mt-2">Este paquete tiene exactamente 1 uso registrado.</p>';
                    this.btnProcessRefund.classList.remove('hidden');
                } else {
                    if (this.paqueteActual.turnos_usados === 0) {
                        statusElement.innerHTML = '<span class="status-invalid">❌ NO USADO</span>';
                        statusElement.innerHTML += '<p class="text-sm text-gray-600 mt-2">Este paquete no ha sido usado aún.</p>';
                    } else {
                        statusElement.innerHTML = '<span class="status-invalid">❌ NO APTO PARA DEVOLUCIÓN</span>';
                        statusElement.innerHTML += `<p class="text-sm text-gray-600 mt-2">Este paquete tiene ${this.paqueteActual.turnos_usados} usos registrados.</p>`;
                    }
                    this.btnProcessRefund.classList.add('hidden');
                }
                
                this.packageInfo.classList.remove('hidden');
                this.resultMessage.classList.add('hidden');
            },

            procesarDevolucion: async function() {
                try {
                    this.mostrarCargandoProcesando();
                    
                    // 1. Guardar en el historial
                    await fetch('/api/guardar-qr', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify({
                            qr_code: this.paqueteActual.codigo
                        })
                    });
                    
                    // 2. Procesar la devolución con la API real
                    const response = await fetch('/api/reportar-falla', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify({
                            qr_code: this.paqueteActual.codigo,
                            machine_id: 0, // ID genérico para devolución
                            machine_name: 'Devolución Manual',
                            turnos_devueltos: 1
                        })
                    });

                    if (!response.ok) {
                        throw new Error('Error en la respuesta del servidor');
                    }

                    const result = await response.json();

                    if (result.success) {
                        this.resultContent.innerHTML = `
                            <div class="text-center">
                                <div class="text-4xl mb-4">✅</div>
                                <h3 class="text-xl font-semibold text-green-600 mb-2">Devolución Exitosa</h3>
                                <p class="text-gray-700">Se ha procesado la devolución de 1 turno para el paquete:</p>
                                <p class="font-mono text-blue-600 my-2">${this.paqueteActual.codigo}</p>
                                <p class="text-gray-700">El cliente ahora tiene <strong>${this.paqueteActual.turns_remaining + 1}</strong> turnos disponibles.</p>
                            </div>
                        `;
                    } else {
                        throw new Error(result.error || 'Error desconocido');
                    }
                    
                    this.resultMessage.classList.remove('hidden');
                    this.btnProcessRefund.classList.add('hidden');
                } catch (error) {
                    console.error("Error procesando devolución:", error);
                    this.mostrarError("❌ Error en devolución", "No se pudo procesar la devolución: " + error.message);
                }
            },

            limpiarFormulario: function() {
                this.qrResult.value = "";
                this.packageInfo.classList.add('hidden');
                this.resultMessage.classList.add('hidden');
                this.paqueteActual = null;
            },

            mostrarCargando: function() {
                this.resultContent.innerHTML = `
                    <div class="text-center">
                        <div class="loading mx-auto mb-4"></div>
                        <p class="text-gray-700">Verificando paquete...</p>
                    </div>
                `;
                this.resultMessage.classList.remove('hidden');
            },

            mostrarCargandoProcesando: function() {
                this.resultContent.innerHTML = `
                    <div class="text-center">
                        <div class="loading mx-auto mb-4"></div>
                        <p class="text-gray-700">Procesando devolución...</p>
                    </div>
                `;
                this.resultMessage.classList.remove('hidden');
            },

            mostrarError: function(titulo, mensaje) {
                this.resultContent.innerHTML = `
                    <div class="text-center">
                        <div class="text-4xl mb-4">❌</div>
                        <h3 class="text-xl font-semibold text-red-600 mb-2">${titulo}</h3>
                        <p class="text-gray-700">${mensaje}</p>
                    </div>
                `;
                this.resultMessage.classList.remove('hidden');
            }
        };

        // Inicializar la aplicación cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            PackFailureApp.init();
        });
    </script>
</body>
</html>
