<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <!-- Icono del sitio -->
  <link rel="icon" href="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" type="image/jpg" />

  <!-- Tailwind y librería de partículas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen overflow-hidden">

  <!-- Fondo partículas -->
  <div id="particles-js"></div>

  <!-- Contenedor del formulario -->
  <div class="bg-[#f4f1eb] p-6 rounded-lg shadow-lg w-96 z-10 relative">
   <img src="{{ url_for('static', filename='img/maquinasmedellinlogo.jpg') }}" alt="Máquinas Medellín" class="w-24 mx-auto mb-4">

    <h1 class="text-2xl font-bold mb-4 text-center">Inicio de sesión</h1>

    <label class="block mb-2 font-semibold">Ingrese su número de empleado</label>
    <input
      type="text"
      id="codigoEmpleado"
      class="w-full border border-gray-300 p-2 rounded mb-4"
      placeholder="Ej: 12345"
    >

   <button type="button" onclick="verificarCodigo()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">
  Aceptar
</button>
  </div>

  <!-- Configuración de partículas -->
 <script src="{{ url_for('static', filename='js/particles-config.js') }}"></script>

  <!-- Script de verificación de login ACTUALIZADO -->
<script>
function verificarCodigo() {
  const codigo = document.getElementById("codigoEmpleado").value.trim();

  if (!codigo) {
    alert("Por favor ingrese su código.");
    return;
  }

  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ codigo })
  })
  .then(res => res.json())
  .then(data => {
    if (data.valido) {
      // ✅ GUARDAR DATOS EN sessionStorage
      sessionStorage.setItem("nombreUsuario", data.nombre);
      sessionStorage.setItem("rolUsuario", data.role);
      sessionStorage.setItem("localUsuario", data.local);
      sessionStorage.setItem("userId", data.user_id);
      
      console.log("✅ Login exitoso. Rol:", data.role);
      
      // ✅ REDIRIGIR SEGÚN EL ROL
      if (data.role === 'admin' || data.role === 'admin_restaurante') {
        // Admins y admin_restaurante ven el modal de selección
        mostrarModalSeleccion(data.role);
      } else if (data.role === 'cajero') {
        // Cajeros van directamente al local
        window.location.href = "/local";
      } else {
        // Para cualquier otro rol, redirección por defecto
        window.location.href = "/local";
      }
      
    } else {
      alert("Código inválido. Intenta de nuevo.");
    }
  })
  .catch(err => {
    console.error("Error:", err);
    alert("Error de conexión.");
  });
}

// ✅ MODAL DE SELECCIÓN PARA ADMINS
function mostrarModalSeleccion(rol) {
  const esAdminRestaurante = rol === 'admin_restaurante';
  const titulo = esAdminRestaurante ? 'Admin Restaurante' : 'Administrador';
  
  const modalHTML = `
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-6 w-96">
        <h2 class="text-2xl font-bold mb-2 text-center">${titulo}</h2>
        <p class="text-gray-600 mb-6 text-center">Elige cómo quieres acceder al sistema</p>
        
        <div class="space-y-4">
          <button onclick="accederComoAdmin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg">
            <i class="fas fa-cog mr-2"></i>Modo Administración
          </button>
          
          <button onclick="accederComoCajero()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded-lg">
            <i class="fas fa-cash-register mr-2"></i>Modo Cajero/Local
          </button>
        </div>
        
        <button onclick="cerrarModal()" class="mt-4 text-gray-500 hover:text-gray-700 float-right">
          <i class="fas fa-times mr-1"></i>Cerrar
        </button>
      </div>
    </div>
  `;
  
  // Crear e injectar el modal
  const modalDiv = document.createElement('div');
  modalDiv.innerHTML = modalHTML;
  modalDiv.id = 'modal-seleccion';
  document.body.appendChild(modalDiv);
  
  // Prevenir cerrar haciendo clic fuera del modal
  modalDiv.addEventListener('click', function(e) {
    if (e.target.id === 'modal-seleccion') {
      e.stopPropagation();
    }
  });
}

function accederComoAdmin() {
  window.location.href = "/admin";
}

function accederComoCajero() {
  window.location.href = "/local";
}

function cerrarModal() {
  const modal = document.getElementById('modal-seleccion');
  if (modal) {
    modal.remove();
  }
}

// ✅ Agregar FontAwesome para los iconos (si no está)
if (!document.querySelector('link[href*="font-awesome"]')) {
  const faLink = document.createElement('link');
  faLink.rel = 'stylesheet';
  faLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
  document.head.appendChild(faLink);
}
</script>
</body>
</html>
