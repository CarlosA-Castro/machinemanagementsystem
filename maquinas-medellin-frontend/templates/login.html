<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Login - inversiones Arcade</title>

  <!-- Icono del sitio -->
  <link rel="icon" href="{{ url_for('static', filename='img/logo.jpg') }}" type="image/jpg" />

  <!-- Tailwind y librería de partículas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
    .btn-touch {
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 768px) {
      .login-container {
        width: 90% !important;
        margin: 1rem !important;
        padding: 1.5rem !important;
      }
      input {
        font-size: 16px !important; /* Previene zoom en iOS */
      }
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 1rem !important;
      }
      h1 {
        font-size: 1.5rem !important;
      }
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

  <!-- Fondo partículas -->
  <div id="particles-js"></div>

  <!-- Contenedor del formulario -->
  <div class="bg-[#f4f1eb] p-6 rounded-xl shadow-lg w-96 max-w-full login-container">
    <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Inversiones Arcade" class="w-20 mx-auto mb-4">

    <h1 class="text-2xl font-bold mb-4 text-center">Inicio de sesión</h1>

    <label class="block mb-2 font-semibold text-gray-700">Ingrese su número de empleado</label>
    <input
      type="text"
      id="codigoEmpleado"
      class="w-full border border-gray-300 p-3 rounded-lg mb-4 text-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
      placeholder="Ej: 12345"
      inputmode="numeric"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >

    <button type="button" onclick="LoginApp.verificarCodigo()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition btn-touch text-lg font-semibold">
      <i class="fas fa-sign-in-alt mr-2"></i>Aceptar
    </button>

    <!-- Loading indicator (oculto inicialmente) -->
    <div id="loading" class="hidden mt-4 text-center">
      <div class="loading mx-auto mb-2"></div>
      <p class="text-gray-600 text-sm">Verificando...</p>
    </div>

    <!-- Soporte táctil para teclado virtual -->
    <div class="mt-4 text-center">
      <a href="https://wa.me/573218001092" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm">
        <i class="fas fa-phone-alt mr-1"></i>Soporte Técnico
      </a>
    </div>

    <div class="mt-3 text-center">
      <a href="/" class="text-gray-400 hover:text-gray-600 text-sm transition">
        <i class="fas fa-arrow-left mr-1"></i>Volver al inicio
      </a>
    </div>
  </div>

  <!-- Configuración de partículas optimizada -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      particlesJS('particles-js', {
            particles: {
              number: { value: 80, density: { enable: true, value_area: 800 } },
              color: { value: '#3b82f6' },
              shape: { type: 'circle' },
              opacity: {
                value: 0.6, random: true,
                anim: { enable: true, speed: 0.8, opacity_min: 0.2, sync: false }
              },
              size: {
                value: 3, random: true,
                anim: { enable: true, speed: 1.5, size_min: 0.5, sync: false }
              },
              line_linked: {
                enable: true, distance: 140, color: '#3b82f6',
                opacity: 0.4, width: 1.2
              },
              move: {
                enable: true, speed: 1.4, direction: 'none',
                random: true, straight: false, out_mode: 'out', bounce: false
              }
            },
            interactivity: {
              detect_on: 'canvas',
              events: {
                onhover: { enable: true, mode: 'grab' },
                onclick: { enable: true, mode: 'push' },
                resize: true
              },
              modes: {
                grab: { distance: 160, line_linked: { opacity: 0.9 } },
                push: { particles_nb: 4 }
              }
            },
            retina_detect: true
          });
    });
  </script>

  <!-- Script de verificación de login -->
  <script>
  const LoginApp = {

    // ── Verificación de código ───────────────────────────────────────────────
    verificarCodigo: function() {
      const codigo = document.getElementById("codigoEmpleado").value.trim();
      const loadingElement = document.getElementById("loading");

      if (!codigo) {
        this.mostrarAlerta("Por favor ingrese su código.", "warning");
        return;
      }

      loadingElement.classList.remove('hidden');
      document.querySelector('button').disabled = true;

      fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Requested-With": "XMLHttpRequest"
        },
        body: JSON.stringify({ codigo })
      })
      .then(res => res.json())
      .then(data => {
        loadingElement.classList.add('hidden');
        document.querySelector('button').disabled = false;

        if (!data.valido) {
          this.mostrarAlerta(data.error || "Código inválido. Intenta de nuevo.", "error");
          return;
        }

        sessionStorage.setItem("nombreUsuario", data.nombre);
        sessionStorage.setItem("rolUsuario",    data.role);
        sessionStorage.setItem("localUsuario",  data.local || '');
        sessionStorage.setItem("userId",        data.user_id || '');

        // Socios: flujo propio sin selector de local
        if (data.role === 'socio') {
          window.location.href = "/socios";
          return;
        }

        // Admin con múltiples locales: mostrar selector
        if (data.needs_location_select && data.locales_disponibles && data.locales_disponibles.length > 1) {
          this.mostrarSelectorLocal(data.locales_disponibles, data.role);
          return;
        }

        // Roles fijos o admin con local ya definido: ir directo
        this._redirigirPorRol(data.role);
      })
      .catch(err => {
        loadingElement.classList.add('hidden');
        document.querySelector('button').disabled = false;
        console.error("Error login:", err);
        this.mostrarAlerta("Error de conexión. Intente nuevamente.", "error");
      });
    },

    // ── Selector de local post-login ─────────────────────────────────────────
    mostrarSelectorLocal: function(locales, role) {
      const tarjetas = locales.map(l => `
        <button
          onclick="LoginApp.seleccionarLocal(${l.id}, '${l.name.replace(/'/g, "\\'")}', '${role}')"
          class="w-full flex items-center gap-3 bg-gray-50 hover:bg-blue-50 border border-gray-200
                 hover:border-blue-400 text-gray-800 py-4 px-5 rounded-xl btn-touch text-left
                 transition-all duration-150 group">
          <span class="w-10 h-10 rounded-full bg-blue-100 group-hover:bg-blue-200 flex items-center
                       justify-center text-blue-600 shrink-0">
            <i class="fas fa-store text-sm"></i>
          </span>
          <span class="font-semibold text-base">${l.name}</span>
          <i class="fas fa-chevron-right ml-auto text-gray-400 group-hover:text-blue-500"></i>
        </button>
      `).join('');

      const html = `
        <div id="modal-selector-local"
             class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
          <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
            <!-- Cabecera -->
            <div class="bg-blue-600 rounded-t-2xl px-6 py-5 text-white">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                  <i class="fas fa-map-marker-alt"></i>
                </div>
                <div>
                  <h2 class="text-xl font-bold leading-tight">Seleccionar local</h2>
                  <p class="text-blue-100 text-sm">¿A qué local deseas ingresar?</p>
                </div>
              </div>
            </div>
            <!-- Lista de locales -->
            <div class="p-5 space-y-3 max-h-72 overflow-y-auto">
              ${tarjetas}
            </div>
            <!-- Pie -->
            <div class="px-5 pb-5">
              <button onclick="LoginApp.cerrarModal('modal-selector-local')"
                      class="w-full py-3 rounded-xl border border-gray-300 text-gray-500
                             hover:bg-gray-50 btn-touch text-sm">
                <i class="fas fa-times mr-1"></i>Cancelar
              </button>
            </div>
          </div>
        </div>
      `;

      const div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div);
    },

    seleccionarLocal: function(locationId, locationName, role) {
      // Mostrar loading dentro del modal
      const tarjetas = document.querySelectorAll('#modal-selector-local button');
      tarjetas.forEach(b => b.disabled = true);

      fetch("/api/session/seleccionar-local", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ location_id: locationId })
      })
      .then(res => res.json())
      .then(data => {
        if (!data.ok) {
          this.mostrarAlerta("No se pudo seleccionar el local.", "error");
          tarjetas.forEach(b => b.disabled = false);
          return;
        }
        sessionStorage.setItem("localActivo", locationName);
        this.cerrarModal('modal-selector-local');
        this._redirigirPorRol(role);
      })
      .catch(() => {
        this.mostrarAlerta("Error de conexión.", "error");
        tarjetas.forEach(b => b.disabled = false);
      });
    },

    // ── Redirección por rol ──────────────────────────────────────────────────
    _redirigirPorRol: function(role) {
      if (role === 'admin') {
        // Admin: ofrecer modo admin o cajero dentro del local seleccionado
        this.mostrarModalModo();
      } else {
        window.location.href = "/local";
      }
    },

    mostrarModalModo: function() {
      const html = `
        <div id="modal-modo"
             class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
          <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
            <div class="bg-gray-800 rounded-t-2xl px-6 py-5 text-white">
              <h2 class="text-xl font-bold">Administrador</h2>
              <p class="text-gray-300 text-sm mt-1">¿Cómo deseas acceder?</p>
            </div>
            <div class="p-5 space-y-3">
              <button onclick="window.location.href='/admin'"
                      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 px-4
                             rounded-xl btn-touch text-base font-semibold">
                <i class="fas fa-cog mr-2"></i>Panel de Administración
              </button>
              <button onclick="window.location.href='/local'"
                      class="w-full bg-green-600 hover:bg-green-700 text-white py-4 px-4
                             rounded-xl btn-touch text-base font-semibold">
                <i class="fas fa-cash-register mr-2"></i>Modo Cajero / Local
              </button>
            </div>
            <div class="px-5 pb-5">
              <button onclick="LoginApp.cerrarModal('modal-modo')"
                      class="w-full py-3 rounded-xl border border-gray-300 text-gray-500
                             hover:bg-gray-50 btn-touch text-sm">
                <i class="fas fa-times mr-1"></i>Cancelar
              </button>
            </div>
          </div>
        </div>
      `;
      const div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div);
    },

    // ── Utilidades ───────────────────────────────────────────────────────────
    cerrarModal: function(id) {
      const el = document.getElementById(id);
      if (el) el.closest('[id]').remove();
    },

    mostrarAlerta: function(mensaje, tipo) {
      const toast = document.createElement('div');
      toast.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 text-white ${
        tipo === 'error' ? 'bg-red-500' : 'bg-yellow-500'
      }`;
      toast.textContent = mensaje;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  };

  // Focus automático y soporte Enter / iOS
  document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('codigoEmpleado');
    input.focus();

    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') LoginApp.verificarCodigo();
    });

    document.addEventListener('touchstart', function() {
      if (input) input.style.fontSize = '16px';
    });
  });
  </script>
</body>
</html>
