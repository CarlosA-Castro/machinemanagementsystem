<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Login - inversiones Arcade</title>

  <!-- Icono del sitio -->
  <link rel="icon" href="{{ url_for('static', filename='img/logo.jpg') }}" type="image/jpg" />

  <!-- Tailwind y librería de partículas -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }
    .btn-touch {
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (max-width: 768px) {
      .login-container {
        width: 90% !important;
        margin: 1rem !important;
        padding: 1.5rem !important;
      }
      input {
        font-size: 16px !important; /* Previene zoom en iOS */
      }
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 1rem !important;
      }
      h1 {
        font-size: 1.5rem !important;
      }
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

  <!-- Fondo partículas -->
  <div id="particles-js"></div>

  <!-- Contenedor del formulario -->
  <div class="bg-[#f4f1eb] p-6 rounded-xl shadow-lg w-96 max-w-full login-container">
    <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Inversiones Arcade" class="w-20 mx-auto mb-4">

    <h1 class="text-2xl font-bold mb-4 text-center">Inicio de sesión</h1>

    <label class="block mb-1 font-semibold text-gray-700">Nombre de usuario</label>
    <input
      type="text"
      id="loginNombre"
      class="w-full border border-gray-300 p-3 rounded-lg mb-3 text-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none font-mono tracking-wider"
      placeholder="Ej: AFGOMEZ"
      autocomplete="username"
      autocorrect="off"
      autocapitalize="characters"
      spellcheck="false"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
    >

    <label class="block mb-1 font-semibold text-gray-700">Contraseña</label>
    <div class="relative mb-4">
      <input
        type="password"
        id="loginPassword"
        class="w-full border border-gray-300 p-3 rounded-lg text-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none pr-12"
        placeholder="Contraseña"
        autocomplete="current-password"
      >
      <button type="button" onclick="LoginApp.togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
        <i id="passwordEye" class="fas fa-eye"></i>
      </button>
    </div>

    <button type="button" onclick="LoginApp.verificarCodigo()" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition btn-touch text-lg font-semibold">
      <i class="fas fa-sign-in-alt mr-2"></i>Aceptar
    </button>

    <!-- Loading indicator (oculto inicialmente) -->
    <div id="loading" class="hidden mt-4 text-center">
      <div class="loading mx-auto mb-2"></div>
      <p class="text-gray-600 text-sm">Verificando...</p>
    </div>

    <!-- Soporte táctil para teclado virtual -->
    <div class="mt-4 text-center">
      <a href="https://wa.me/573218001092" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm">
        <i class="fas fa-phone-alt mr-1"></i>Soporte Técnico
      </a>
    </div>

    <div class="mt-3 text-center">
      <a href="/" class="text-gray-400 hover:text-gray-600 text-sm transition">
        <i class="fas fa-arrow-left mr-1"></i>Volver al inicio
      </a>
    </div>
  </div>

  <!-- Configuración de partículas optimizada -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      particlesJS('particles-js', {
            particles: {
              number: { value: 80, density: { enable: true, value_area: 800 } },
              color: { value: '#3b82f6' },
              shape: { type: 'circle' },
              opacity: {
                value: 0.6, random: true,
                anim: { enable: true, speed: 0.8, opacity_min: 0.2, sync: false }
              },
              size: {
                value: 3, random: true,
                anim: { enable: true, speed: 1.5, size_min: 0.5, sync: false }
              },
              line_linked: {
                enable: true, distance: 140, color: '#3b82f6',
                opacity: 0.4, width: 1.2
              },
              move: {
                enable: true, speed: 1.4, direction: 'none',
                random: true, straight: false, out_mode: 'out', bounce: false
              }
            },
            interactivity: {
              detect_on: 'canvas',
              events: {
                onhover: { enable: true, mode: 'grab' },
                onclick: { enable: true, mode: 'push' },
                resize: true
              },
              modes: {
                grab: { distance: 160, line_linked: { opacity: 0.9 } },
                push: { particles_nb: 4 }
              }
            },
            retina_detect: true
          });
    });
  </script>

  <!-- Script de verificación de login -->
  <script>
  const LoginApp = {

    // ── Mostrar / ocultar contraseña ─────────────────────────────────────────
    togglePassword: function() {
      const input = document.getElementById("loginPassword");
      const icon  = document.getElementById("passwordEye");
      if (input.type === "password") {
        input.type = "text";
        icon.className = "fas fa-eye-slash";
      } else {
        input.type = "password";
        icon.className = "fas fa-eye";
      }
    },

    // ── Verificación ─────────────────────────────────────────────────────────
    verificarCodigo: function() {
      const nombre   = document.getElementById("loginNombre").value.trim();
      const password = document.getElementById("loginPassword").value;
      const loadingElement = document.getElementById("loading");

      if (!nombre || !password) {
        this.mostrarAlerta("Ingrese nombre y contraseña.", "warning");
        return;
      }

      loadingElement.classList.remove('hidden');
      document.querySelector('button[onclick]').disabled = true;

      fetch("/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Requested-With": "XMLHttpRequest"
        },
        body: JSON.stringify({ nombre, password })
      })
      .then(res => res.json())
      .then(data => {
        loadingElement.classList.add('hidden');
        document.querySelector('button[onclick]').disabled = false;

        if (!data.valido) {
          this.mostrarAlerta(data.error || "Código inválido. Intenta de nuevo.", "error");
          return;
        }

        sessionStorage.setItem("nombreUsuario", data.nombre);
        sessionStorage.setItem("rolUsuario",    data.role);
        sessionStorage.setItem("localUsuario",  data.local || '');
        sessionStorage.setItem("userId",        data.user_id || '');

        // Socios: flujo propio sin selector de local
        if (data.role === 'socio') {
          window.location.href = "/socios";
          return;
        }

        // Admin con múltiples locales: mostrar selector
        if (data.needs_location_select && data.locales_disponibles && data.locales_disponibles.length > 1) {
          this.mostrarSelectorLocal(data.locales_disponibles, data.role);
          return;
        }

        // Roles fijos o admin con local ya definido: ir directo
        this._redirigirPorRol(data.role);
      })
      .catch(err => {
        loadingElement.classList.add('hidden');
        document.querySelector('button[onclick]').disabled = false;
        console.error("Error login:", err);
        this.mostrarAlerta("Error de conexión. Intente nuevamente.", "error");
      });
    },

    // ── Selector de local post-login ─────────────────────────────────────────
    mostrarSelectorLocal: function(locales, role) {
      const tarjetas = locales.map(l => `
        <button
          onclick="LoginApp.seleccionarLocal(${l.id}, '${l.name.replace(/'/g, "\\'")}', '${role}')"
          style="width:100%; background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.25);
                 border-radius:0.875rem; padding:0.875rem 1.125rem; cursor:pointer; margin-bottom:0.625rem;
                 display:flex; align-items:center; gap:0.875rem; text-align:left; transition:all 0.2s;"
          onmouseover="this.style.background='rgba(59,130,246,0.2)'; this.style.borderColor='rgba(59,130,246,0.6)'"
          onmouseout="this.style.background='rgba(59,130,246,0.08)'; this.style.borderColor='rgba(59,130,246,0.25)'">
          <div style="width:42px; height:42px; border-radius:0.75rem; background:#2563eb;
                      display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <i class="fas fa-store" style="color:#fff; font-size:1rem;"></i>
          </div>
          <span style="color:#fff; font-weight:600; font-size:0.95rem;">${l.name}</span>
          <i class="fas fa-chevron-right" style="color:#3b82f6; margin-left:auto; font-size:0.8rem;"></i>
        </button>
      `).join('');

      const html = `
        <div id="modal-selector-local"
             class="fixed inset-0 z-50 flex items-center justify-center p-4"
             style="background:rgba(0,0,0,0.70); backdrop-filter:blur(6px);">
          <div style="background:#1e1e2e; border-radius:1.25rem; width:100%; max-width:380px;
                      box-shadow:0 25px 60px rgba(0,0,0,0.55); overflow:hidden;">
            <!-- Cabecera -->
            <div style="padding:1.375rem 1.5rem 1.125rem; border-bottom:1px solid rgba(255,255,255,0.08);
                        display:flex; align-items:center; gap:0.875rem;">
              <div style="width:44px; height:44px; border-radius:50%; background:rgba(37,99,235,0.2);
                          display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <i class="fas fa-map-marker-alt" style="color:#3b82f6; font-size:1.1rem;"></i>
              </div>
              <div>
                <p style="color:#a0a0b8; font-size:0.7rem; margin:0; text-transform:uppercase; letter-spacing:0.08em;">Acceso al sistema</p>
                <p style="color:#fff; font-size:1rem; font-weight:700; margin:0;">Seleccionar local</p>
              </div>
            </div>
            <!-- Lista de locales -->
            <div style="padding:1.125rem; max-height:17rem; overflow-y:auto;">
              ${tarjetas}
            </div>
            <!-- Pie -->
            <div style="padding:0 1.125rem 1.125rem;">
              <button onclick="LoginApp.cerrarModal('modal-selector-local')"
                      style="width:100%; padding:0.75rem; border-radius:0.75rem;
                             border:1px solid rgba(255,255,255,0.12); background:transparent;
                             color:#6b7280; cursor:pointer; font-size:0.85rem; transition:background 0.2s;"
                      onmouseover="this.style.background='rgba(255,255,255,0.06)'"
                      onmouseout="this.style.background='transparent'">
                <i class="fas fa-times mr-1"></i>Cancelar
              </button>
            </div>
          </div>
        </div>
      `;

      const div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div);
    },

    seleccionarLocal: function(locationId, locationName, role) {
      // Mostrar loading dentro del modal
      const tarjetas = document.querySelectorAll('#modal-selector-local button');
      tarjetas.forEach(b => b.disabled = true);

      fetch("/api/session/seleccionar-local", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ location_id: locationId })
      })
      .then(res => res.json())
      .then(data => {
        if (!data.ok) {
          this.mostrarAlerta("No se pudo seleccionar el local.", "error");
          tarjetas.forEach(b => b.disabled = false);
          return;
        }
        sessionStorage.setItem("localActivo", locationName);
        this.cerrarModal('modal-selector-local');
        this._redirigirPorRol(role);
      })
      .catch(() => {
        this.mostrarAlerta("Error de conexión.", "error");
        tarjetas.forEach(b => b.disabled = false);
      });
    },

    // ── Redirección por rol ──────────────────────────────────────────────────
    _redirigirPorRol: function(role) {
      if (role === 'admin') {
        // Admin: ofrecer modo admin o cajero dentro del local seleccionado
        this.mostrarModalModo();
      } else {
        window.location.href = "/local";
      }
    },

    mostrarModalModo: function() {
      const html = `
        <div id="modal-modo"
             class="fixed inset-0 z-50 flex items-center justify-center p-4"
             style="background:rgba(0,0,0,0.70); backdrop-filter:blur(6px);">
          <div style="background:#1e1e2e; border-radius:1.25rem; width:100%; max-width:400px;
                      box-shadow:0 25px 60px rgba(0,0,0,0.55); overflow:hidden;">
            <!-- Header -->
            <div style="padding:1.375rem 1.5rem 1.125rem; border-bottom:1px solid rgba(255,255,255,0.08);
                        display:flex; align-items:center; gap:0.875rem;">
              <div style="width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.08);
                          display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                <i class="fas fa-user-shield" style="color:#a0a0c0; font-size:1.1rem;"></i>
              </div>
              <div>
                <p style="color:#a0a0b8; font-size:0.7rem; margin:0; text-transform:uppercase; letter-spacing:0.08em;">Sesión iniciada como</p>
                <p style="color:#fff; font-size:1rem; font-weight:700; margin:0;">Administrador</p>
              </div>
            </div>
            <!-- Cuerpo -->
            <div style="padding:1.125rem;">
              <p style="color:#6b7280; font-size:0.82rem; margin:0 0 0.875rem; text-align:center;">¿Cómo deseas acceder?</p>
              <button onclick="window.location.href='/admin'"
                      style="width:100%; background:rgba(29,78,216,0.12); border:1px solid rgba(29,78,216,0.35);
                             border-radius:0.875rem; padding:1rem 1.25rem; margin-bottom:0.625rem; cursor:pointer;
                             display:flex; align-items:center; gap:1rem; text-align:left; transition:all 0.2s;"
                      onmouseover="this.style.background='rgba(29,78,216,0.22)'; this.style.borderColor='rgba(29,78,216,0.7)'"
                      onmouseout="this.style.background='rgba(29,78,216,0.12)'; this.style.borderColor='rgba(29,78,216,0.35)'">
                <div style="width:46px; height:46px; border-radius:0.75rem; background:#1d4ed8;
                            display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                  <i class="fas fa-sliders-h" style="color:#fff; font-size:1.15rem;"></i>
                </div>
                <div>
                  <p style="color:#fff; font-weight:700; font-size:0.95rem; margin:0 0 0.15rem;">Panel de Administración</p>
                  <p style="color:#7090b0; font-size:0.78rem; margin:0;">Gestión completa del sistema</p>
                </div>
                <i class="fas fa-chevron-right" style="color:#3b82f6; margin-left:auto; font-size:0.8rem;"></i>
              </button>
              <button onclick="window.location.href='/local'"
                      style="width:100%; background:rgba(5,150,105,0.12); border:1px solid rgba(5,150,105,0.35);
                             border-radius:0.875rem; padding:1rem 1.25rem; cursor:pointer;
                             display:flex; align-items:center; gap:1rem; text-align:left; transition:all 0.2s;"
                      onmouseover="this.style.background='rgba(5,150,105,0.22)'; this.style.borderColor='rgba(5,150,105,0.7)'"
                      onmouseout="this.style.background='rgba(5,150,105,0.12)'; this.style.borderColor='rgba(5,150,105,0.35)'">
                <div style="width:46px; height:46px; border-radius:0.75rem; background:#059669;
                            display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                  <i class="fas fa-cash-register" style="color:#fff; font-size:1.15rem;"></i>
                </div>
                <div>
                  <p style="color:#fff; font-weight:700; font-size:0.95rem; margin:0 0 0.15rem;">Modo Cajero / Local</p>
                  <p style="color:#70a090; font-size:0.78rem; margin:0;">Reportes y operación del local</p>
                </div>
                <i class="fas fa-chevron-right" style="color:#10b981; margin-left:auto; font-size:0.8rem;"></i>
              </button>
            </div>
            <div style="padding:0 1.125rem 1.125rem;">
              <button onclick="LoginApp.cerrarModal('modal-modo')"
                      style="width:100%; padding:0.75rem; border-radius:0.75rem;
                             border:1px solid rgba(255,255,255,0.12); background:transparent;
                             color:#6b7280; cursor:pointer; font-size:0.85rem; transition:background 0.2s;"
                      onmouseover="this.style.background='rgba(255,255,255,0.06)'"
                      onmouseout="this.style.background='transparent'">
                <i class="fas fa-times mr-1"></i>Cancelar
              </button>
            </div>
          </div>
        </div>
      `;
      const div = document.createElement('div');
      div.innerHTML = html;
      document.body.appendChild(div);
    },

    // ── Utilidades ───────────────────────────────────────────────────────────
    cerrarModal: function(id) {
      const el = document.getElementById(id);
      if (el) el.closest('[id]').remove();
    },

    mostrarAlerta: function(mensaje, tipo) {
      const toast = document.createElement('div');
      toast.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 text-white ${
        tipo === 'error' ? 'bg-red-500' : 'bg-yellow-500'
      }`;
      toast.textContent = mensaje;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  };

  // Focus automático y soporte Enter / iOS
  document.addEventListener('DOMContentLoaded', function() {
    const inputNombre   = document.getElementById('loginNombre');
    const inputPassword = document.getElementById('loginPassword');

    if (inputNombre) inputNombre.focus();

    [inputNombre, inputPassword].forEach(el => {
      if (el) el.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') LoginApp.verificarCodigo();
      });
    });

    document.addEventListener('touchstart', function() {
      [inputNombre, inputPassword].forEach(el => {
        if (el) el.style.fontSize = '16px';
      });
    });
  });
  </script>
</body>
</html>
