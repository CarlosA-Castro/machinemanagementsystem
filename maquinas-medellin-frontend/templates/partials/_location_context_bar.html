<!--
  _location_context_bar.html
  Barra de contexto de local activo.
  Incluir con: {% include 'partials/_location_context_bar.html' %}
  Requiere: location-context.js cargado en la página.
-->
<div id="location-context-bar"
     class="flex flex-col sm:flex-row items-start sm:items-center justify-between
            gap-2 bg-white border border-blue-100 rounded-xl px-4 py-3 mb-5
            shadow-sm text-sm">

  <!-- Info del local activo -->
  <div class="flex items-center gap-2 min-w-0">
    <span class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0">
      <i class="fas fa-store text-blue-600 text-xs"></i>
    </span>
    <div class="min-w-0">
      <span class="text-gray-500 text-xs block leading-none mb-0.5">Local activo</span>
      <span id="lcb-nombre-local"
            class="font-semibold text-gray-800 truncate block">
        Cargando...
      </span>
    </div>
  </div>

  <!-- Controles -->
  <div class="flex items-center gap-2 shrink-0">

    <!-- Indicador "Todos los locales" (visible solo en modo global) -->
    <span id="lcb-badge-todos"
          class="hidden items-center gap-1 bg-purple-100 text-purple-700 text-xs
                 font-semibold px-2.5 py-1 rounded-full">
      <i class="fas fa-globe-americas text-xs"></i> Todos los locales
    </span>

    <!-- Botón "Ver todos" (visible solo si can_view_all y hay local activo) -->
    <button id="lcb-btn-todos"
            onclick="LocationContext.verTodos()"
            class="hidden items-center gap-1 text-xs text-purple-600 hover:text-purple-800
                   border border-purple-300 hover:border-purple-500 px-3 py-1.5
                   rounded-lg transition-colors">
      <i class="fas fa-globe-americas"></i>
      <span class="hidden sm:inline">Ver todos</span>
    </button>

    <!-- Botón / dropdown "Cambiar local" -->
    <div class="relative" id="lcb-switcher-wrapper">

      <!-- Versión bloqueada (rol fijo) -->
      <span id="lcb-fijo"
            class="hidden items-center gap-1 text-xs text-gray-400 border border-gray-200
                   px-3 py-1.5 rounded-lg cursor-not-allowed"
            title="Asignado a este local">
        <i class="fas fa-lock text-xs"></i>
        <span class="hidden sm:inline">Local fijo</span>
      </span>

      <!-- Botón desplegable (rol con can_switch) -->
      <button id="lcb-btn-cambiar"
              onclick="LocationContext.toggleDropdown()"
              class="hidden items-center gap-1 text-xs text-blue-600 hover:text-blue-800
                     border border-blue-300 hover:border-blue-500 px-3 py-1.5
                     rounded-lg transition-colors">
        <i class="fas fa-exchange-alt text-xs"></i>
        <span class="hidden sm:inline">Cambiar local</span>
        <i class="fas fa-chevron-down text-xs ml-0.5" id="lcb-chevron"></i>
      </button>

      <!-- Dropdown de locales -->
      <div id="lcb-dropdown"
           class="hidden absolute right-0 top-full mt-1 bg-white border border-gray-200
                  rounded-xl shadow-lg z-50 min-w-48 overflow-hidden">
        <div class="px-3 py-2 border-b border-gray-100 text-xs text-gray-500 font-medium">
          Seleccionar local
        </div>
        <div id="lcb-dropdown-lista" class="max-h-52 overflow-y-auto">
          <!-- Inyectado por location-context.js -->
        </div>
        <!-- Opción "Ver todos" dentro del dropdown (solo can_view_all) -->
        <div id="lcb-dropdown-todos" class="hidden border-t border-gray-100">
          <button onclick="LocationContext.verTodos()"
                  class="w-full flex items-center gap-2 px-4 py-3 text-sm
                         text-purple-600 hover:bg-purple-50 transition-colors">
            <i class="fas fa-globe-americas text-xs"></i>
            Ver todos los locales
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Overlay para cerrar dropdown al hacer clic fuera -->
<div id="lcb-overlay" class="hidden fixed inset-0 z-40" onclick="LocationContext.cerrarDropdown()"></div>
