name: ✅ Final Deployment Test

on:
  workflow_dispatch:

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 SSH Connection Test
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          script: |
            echo "🎉 ¡CONEXIÓN SSH EXITOSA!"
            echo "================================"
            echo "Fecha: $(date)"
            echo "Usuario: $(whoami)"
            echo "Hostname: $(hostname)"
            echo "Directorio: $(pwd)"
            echo "================================"
            echo ""
            echo "✅ El despliegue automático YA funciona."
            echo "🌐 Tu app está en: http://18.118.2.49:5000/"
            
            # Opcional: verificar Docker
            sudo docker ps 2>/dev/null && echo "🐳 Docker funcionando" || echo "⚠️ Docker no encontrado"