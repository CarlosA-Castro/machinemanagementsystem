name: 🚀 Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Checkout código
        uses: actions/checkout@v3
        
      - name: 🚀 Desplegar en EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            echo "🚀 INICIANDO DEPLOY CON DOCKER BUILD"
            echo "====================================="
            
            # 1. Actualizar código
            cd /home/ec2-user
            if [ ! -d "machinemanagementsystem" ]; then
              git clone https://github.com/CarlosA-Castro/machinemanagementsystem.git
            fi
            
            cd machinemanagementsystem
            git pull origin main
            
            # 2. Copiar docker-compose.yml actualizado
            echo "📄 Copiando configuración actualizada..."
            cp docker-compose.yml /home/ec2-user/
            
            # 3. Usar docker-compose para construir (ahora usa build: .)
            echo "🐳 Construyendo y levantando servicios..."
            cd /home/ec2-user
            
            # Limpiar imágenes viejas
            sudo docker system prune -f
            
            # Construir y levantar (docker-compose hará el build automáticamente)
            sudo docker-compose down
            sudo docker-compose up -d --build  
            
            # 4. Esperar y verificar
            echo "⏳ Esperando inicialización..."
            sleep 15
            
            # 5. Verificar que los cambios están dentro del contenedor
            echo "🔍 Verificando archivos actualizados..."
            sudo docker exec ec2-user-web-1 grep "Inicio de sesión" /app/maquinas-medellin-frontend/templates/login.html
            
            # 6. Health check
            echo "🌐 Probando aplicación..."
            if curl -f -s http://localhost:5000 > /dev/null; then
              echo "✅ ¡APP ACTUALIZADA CORRECTAMENTE!"
              echo "🔗 URL: http://3.151.87.130:5000/"
              
              # Mostrar versión actual
              echo "📦 Imagen actual:"
              sudo docker images | grep "machinemanagementsystem-web"
            else
              echo "⚠️ Revisando logs..."
              sudo docker logs ec2-user-web-1 --tail=20
            fi
            echo "====================================="
            echo "🚀 DEPLOY FINALIZADO"