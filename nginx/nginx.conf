# ── HTTP — redirige a HTTPS y sirve el challenge de Let's Encrypt ─────────────
server {
    listen 80;
    server_name inversionesarcade.com www.inversionesarcade.com;

    # Certbot coloca aquí los archivos del challenge de renovación
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name inversionesarcade.com www.inversionesarcade.com;

    ssl_certificate     /etc/letsencrypt/live/inversionesarcade.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inversionesarcade.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    # Límite de tamaño para uploads de firmware
    client_max_body_size 16M;

    location / {
        proxy_pass         http://web:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
    }
}
